schemaVersion: 2.2.0
metadata:
  name: jboss-eap-kitchensink
  displayName: JBoss EAP Kitchensink
  description: JBoss EAP development environment with hot-reload
  tags: ["Java", "JBoss", "EAP", "Maven"]
  projectType: "jboss-eap"
  language: "Java"
  version: 1.0.0

components:
  # Development tools container with WildFly
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:latest
      memoryLimit: 4Gi
      cpuLimit: 2000m
      mountSources: true
      endpoints:
        - name: wildfly-app
          targetPort: 9090
          exposure: public
          protocol: http
        - name: debug
          targetPort: 5005
          exposure: internal
      env:
        - name: MAVEN_OPTS
          value: "-Xmx1g"
      volumeMounts:
        - name: m2
          path: /home/user/.m2

  # Persistent Maven cache
  - name: m2
    volume:
      size: 3Gi

commands:
  # Build the application
  - id: build
    exec:
      component: tools
      commandLine: mvn clean package -DskipTests
      workingDir: ${PROJECT_SOURCE}/components/kitchensink
      group:
        kind: build
        isDefault: true

  # Setup WildFly (run once)
  - id: setup-wildfly
    exec:
      component: tools
      commandLine: |
        if [ ! -d "wildfly-27.0.1.Final" ]; then
          echo "Downloading WildFly..."
          wget -q https://github.com/wildfly/wildfly/releases/download/27.0.1.Final/wildfly-27.0.1.Final.tar.gz
          tar -xzf wildfly-27.0.1.Final.tar.gz
          rm wildfly-27.0.1.Final.tar.gz
          echo "WildFly ready!"
        else
          echo "WildFly already downloaded"
        fi
      workingDir: ${PROJECT_SOURCE}/components/kitchensink
      group:
        kind: build

  # Run WildFly with the app (with hot-reload)
  - id: run
    exec:
      component: tools
      commandLine: |
        # Deploy the app
        cp target/kitchensink.war wildfly-27.0.1.Final/standalone/deployments/ROOT.war
        # Start WildFly on port 9090
        ./wildfly-27.0.1.Final/bin/standalone.sh -b 0.0.0.0 \
          -Djboss.http.port=9090 \
          -Djboss.https.port=9443 \
          -Djboss.management.http.port=10990
      workingDir: ${PROJECT_SOURCE}/components/kitchensink
      group:
        kind: run
        isDefault: true

  # Watch and auto-deploy changes (run in separate terminal)
  - id: watch
    exec:
      component: tools
      commandLine: |
        while true; do
          mvn package -DskipTests -q
          cp target/kitchensink.war wildfly-27.0.1.Final/standalone/deployments/ROOT.war
          echo "Deployed at $(date)"
          sleep 5
        done
      workingDir: ${PROJECT_SOURCE}/components/kitchensink
      group:
        kind: run

  # Run tests
  - id: test
    exec:
      component: tools
      commandLine: mvn test
      workingDir: ${PROJECT_SOURCE}/components/kitchensink
      group:
        kind: test
