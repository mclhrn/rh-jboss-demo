apiVersion: v1
kind: Service
metadata:
  name: kitchensink
  namespace: kitchensink-dev
  labels:
    app: kitchensink
spec:
  selector:
    app: kitchensink
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: admin
      port: 9990
      targetPort: 9990
      protocol: TCP
  type: ClusterIP
