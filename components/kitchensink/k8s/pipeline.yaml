apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: kitchensink-pipeline
  namespace: kitchensink-dev
spec:
  params:
    - name: git-url
      type: string
      description: Git repository URL
      default: https://github.com/mclhrn/rh-jboss-demo
    - name: git-revision
      type: string
      description: Git revision to build
      default: main
    - name: image-name
      type: string
      description: Container image name
      default: quay.io/mhearne/kitchensink
    - name: path-context
      type: string
      description: Path to build context
      default: components/kitchensink

  workspaces:
    - name: shared-workspace
      description: Workspace for source code and build artifacts
    - name: maven_settings
      description: Maven local repository cache

  tasks:
    - name: git-clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: maven-build
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: maven
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - git-clone
      params:
        - name: GOALS
          value:
            - clean
            - package
            - -DskipTests
        - name: SUBDIRECTORY
          value: $(params.path-context)
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven_settings
          workspace: maven_settings

    - name: build-and-push-image
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - maven-build
      params:
        - name: IMAGE
          value: $(params.image-name):$(params.git-revision)
        - name: DOCKERFILE
          value: $(params.path-context)/Containerfile
        - name: CONTEXT
          value: $(params.path-context)
        - name: TLS_VERIFY
          value: "true"
      workspaces:
        - name: source
          workspace: shared-workspace
