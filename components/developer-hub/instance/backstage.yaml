apiVersion: rhdh.redhat.com/v1alpha3
kind: Backstage
metadata:
  name: developer-hub
  namespace: rhdh
spec:
  application:
    appConfig:
      mountPath: /opt/app-root/src
      configMaps:
        - name: app-config
    extraEnvs:
      secrets:
        - name: github-credentials
    replicas: 1
    route:
      enabled: true
      tls:
        enabled: true
        insecureEdgeTerminationPolicy: Redirect
        termination: edge
  database:
    enableLocalDb: true
