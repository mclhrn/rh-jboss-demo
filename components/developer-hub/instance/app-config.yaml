apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: rhdh
data:
  app-config.yaml: |
    app:
      title: Red Hat Developer Hub - JBoss Modernization Demo
      baseUrl: https://backstage-rhdh.apps.example.com  # Update with actual route

    organization:
      name: Red Hat Demo

    backend:
      baseUrl: https://backstage-rhdh.apps.example.com
      listen:
        port: 7007
      cors:
        origin: https://backstage-rhdh.apps.example.com
        methods: [GET, POST, PUT, DELETE]
        credentials: true
      database:
        client: better-sqlite3
        connection: ':memory:'

    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    catalog:
      import:
        entityFilename: catalog-info.yaml
      rules:
        - allow: [Component, System, API, Resource, Location, Template]
      locations:
        # Register the kitchensink application
        - type: url
          target: https://github.com/mclhrn/rh-jboss-demo/blob/main/components/kitchensink/catalog-info.yaml

        # Register JBoss EAP template
        - type: url
          target: https://github.com/mclhrn/rh-jboss-demo/blob/main/components/developer-hub/templates/jboss-template/template.yaml
